<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Velora | Premium Shopping</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: white;
        }

        /* NAVBAR */

        .navbar{
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .navbar-brand{
            color: gold !important;
            font-size: 30px;
            font-weight: bold;
        }

        .nav-link{
            color: white !important;
            transition: 0.3s;
        }

        .nav-link:hover{
            color: gold !important;
        }

        /* HERO */

        .hero{
            min-height: 100vh;
            display: flex;
            align-items: center;
            background:
                    linear-gradient(rgba(0,0,0,0.7),
                    rgba(0,0,0,0.8)),
                    url('https://images.unsplash.com/photo-1441986300917-64674bd600d8');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero::after{
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,215,0,0.2), transparent);
        }

        .hero h1{
            font-size: 75px;
            font-weight: 700;
        }

        .hero span{
            color: gold;
        }

        .hero p{
            font-size: 20px;
            color: #cbd5e1;
        }

        /* BUTTON */

        .btn-gold{
            background: linear-gradient(45deg, gold, orange);
            border: none;
            color: black;
            border-radius: 40px;
            padding: 12px 30px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
            transition: 0.3s;
        }

        .btn-gold:hover{
            transform: scale(1.05);
            background: white;
        }

        /* PRODUCT CARD */

        .product-card{
            background: rgba(30,41,59,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.4s;
        }

        .product-card:hover{
            transform: translateY(-10px);
        }

        .product-card img{
            height: 300px;
            object-fit: cover;
            transition: 0.4s;
        }

        .product-card:hover img{
            transform: scale(1.05);
        }

        .price{
            color: gold;
            font-size: 22px;
            font-weight: bold;
        }

        /* FOOTER */

        footer{
            background-color: black;
            padding: 20px;
            text-align: center;
            color: #94a3b8;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">

        <a class="navbar-brand" th:href="@{/}">
            Velora
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- HERO -->

<section class="hero">
    <div class="container text-center">

        <h1>
            Luxury Shopping <br>
            Starts With <span>You</span>
        </h1>

        <p class="mt-4">
            Experience next-gen shopping with premium style & innovation.
        </p>

        <a th:href="@{/products}" class="btn btn-gold mt-4">
            Shop Now
        </a>

    </div>
</section>

<!-- PRODUCTS -->

<section class="container py-5">

    <h2 class="text-center mb-5 fw-bold text-warning">
        Featured Products
    </h2>

    <div class="row g-4">

        <!-- PRODUCT 1 -->
        <div class="col-md-4">
            <div class="product-card shadow-lg">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="w-100">

                <div class="p-4 text-center">
                    <h4>Nike Shoes</h4>
                    <p class="price">₹4,999</p>
                    <button class="btn btn-gold">Add To Cart</button>
                </div>

            </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="col-md-4">
            <div class="product-card shadow-lg">

                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" class="w-100">

                <div class="p-4 text-center">
                    <h4>Premium T-Shirt</h4>
                    <p class="price">₹1,299</p>
                    <button class="btn btn-gold">Add To Cart</button>
                </div>

            </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="col-md-4">
            <div class="product-card shadow-lg">

                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" class="w-100">

                <div class="p-4 text-center">
                    <h4>Smart Phone</h4>
                    <p class="price">₹59,999</p>
                    <button class="btn btn-gold">Add To Cart</button>
                </div>

            </div>
        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>
    <h5>© 2026 Velora | All Rights Reserved</h5>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
