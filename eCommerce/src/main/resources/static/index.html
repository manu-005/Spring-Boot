<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopEasy - Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color: #f5f5f5;
        }

        .hero-section{
            height: 90vh;
            background: linear-gradient(to right,#0f172a,#1e3a8a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title{
            font-size: 60px;
            font-weight: bold;
        }

        .hero-text{
            font-size: 22px;
        }

        .product-card{
            transition: 0.3s;
        }

        .product-card:hover{
            transform: translateY(-10px);
        }

        .footer{
            background-color: black;
            color: white;
            padding: 20px;
            text-align: center;
        }

    </style>
</head>

<body>

<!-- Navbar Start -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
           th:href="@{/}">
            ShopEasy
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active"
                       th:href="@{/}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/products}">
                        Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/login}">
                        Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/register}">
                        Register
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Navbar End -->


<!-- Hero Section Start -->

<section class="hero-section">

    <div class="container">

        <h1 class="hero-title">
            Welcome To ShopEasy
        </h1>

        <p class="hero-text mt-3">
            Buy Best Products With Amazing Offers
        </p>

        <a th:href="@{/products}"
           class="btn btn-warning btn-lg mt-4">
            Shop Now
        </a>

    </div>

</section>

<!-- Hero Section End -->


<!-- Product Section Start -->

<section class="container py-5">

    <h2 class="text-center mb-5 fw-bold">
        Featured Products
    </h2>

    <div class="row g-4">

        <!-- Product 1 -->

        <div class="col-md-4">

            <div class="card shadow-lg border-0 product-card">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                     class="card-img-top"
                     height="300"
                     alt="Shoes">

                <div class="card-body text-center">

                    <h4 class="card-title">
                        Nike Shoes
                    </h4>

                    <p class="text-success fw-bold fs-5">
                        ₹2999
                    </p>

                    <button class="btn btn-dark">
                        Add To Cart
                    </button>

                </div>

            </div>

        </div>

        <!-- Product 2 -->

        <div class="col-md-4">

            <div class="card shadow-lg border-0 product-card">

                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
                     class="card-img-top"
                     height="300"
                     alt="T-Shirt">

                <div class="card-body text-center">

                    <h4 class="card-title">
                        T-Shirt
                    </h4>

                    <p class="text-success fw-bold fs-5">
                        ₹999
                    </p>

                    <button class="btn btn-dark">
                        Add To Cart
                    </button>

                </div>

            </div>

        </div>

        <!-- Product 3 -->

        <div class="col-md-4">

            <div class="card shadow-lg border-0 product-card">

                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
                     class="card-img-top"
                     height="300"
                     alt="Mobile">

                <div class="card-body text-center">

                    <h4 class="card-title">
                        Smart Phone
                    </h4>

                    <p class="text-success fw-bold fs-5">
                        ₹19999
                    </p>

                    <button class="btn btn-dark">
                        Add To Cart
                    </button>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- Product Section End -->


<!-- Footer Start -->

<footer class="footer">

    <h5>
        © 2026 ShopEasy | All Rights Reserved
    </h5>

</footer>

<!-- Footer End -->

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
