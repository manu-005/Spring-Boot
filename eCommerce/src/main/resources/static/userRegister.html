<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Velora</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#020617,#0f172a);
            color: white;
        }

        .navbar{
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(15px);
        }

        .navbar-brand{
            color: gold !important;
            font-weight: bold;
            font-size: 28px;
        }

        /* FORM CARD */

        .form-card{
            background: rgba(30,41,59,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .form-control, .form-select{
            background: #1e293b;
            border: none;
            color: white;
            border-radius: 10px;
        }

        .form-control:focus{
            box-shadow: 0 0 10px gold;
        }

        label{
            margin-top: 10px;
        }

        .btn-gold{
            background: linear-gradient(45deg, gold, orange);
            border: none;
            color: black;
            border-radius: 30px;
            padding: 10px;
            font-weight: 600;
            width: 100%;
        }

        .btn-gold:hover{
            background: white;
        }

        .title{
            color: gold;
            font-weight: bold;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Velora</a>
    </div>
</nav>

<!-- REGISTER FORM -->

<section class="container d-flex justify-content-center align-items-center vh-100">

    <div class="col-md-7">

        <div class="form-card">

            <h2 class="text-center title mb-4">Create Account</h2>

            <form th:action="@{/register}" method="post">

                <!-- NAME -->
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required>

                <!-- EMAIL -->
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>

                <!-- PHONE -->
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" required>

                <!-- PASSWORD -->
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>

                <!-- CONFIRM PASSWORD -->
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-control" required>

                <!-- GENDER -->
                <label>Gender</label>
                <select name="gender" class="form-select">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

                <!-- ADDRESS -->
                <label>Address</label>
                <textarea name="address" class="form-control"></textarea>

                <!-- CITY & STATE -->
                <div class="row">

                    <div class="col-md-6">
                        <label>City</label>
                        <input type="text" name="city" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>State</label>
                        <input type="text" name="state" class="form-control">
                    </div>

                </div>

                <!-- PINCODE -->
                <label>Pincode</label>
                <input type="text" name="pincode" class="form-control">

                <!-- TERMS -->
                <div class="form-check mt-3">
                    <input type="checkbox" class="form-check-input" required>
                    <label class="form-check-label">
                        I agree to Terms & Conditions
                    </label>
                </div>

                <!-- SUBMIT -->
                <button type="submit" class="btn btn-gold mt-4">
                    Register
                </button>

            </form>

            <!-- LOGIN LINK -->
            <p class="text-center mt-3">
                Already have an account?
                <a th:href="@{/login}" style="color: gold;">Login</a>
            </p>

        </div>

    </div>

</section>

</body>
</html>
